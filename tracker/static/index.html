<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Tracker — AI Job Search AU</title>
  <link rel="stylesheet" href="/style.css?v=3" />
</head>
<body>
  <header>
    <h1>Job Tracker</h1>
    <p class="subtitle">Local applications dashboard · <code>job_search_tracker.csv</code></p>
    <button type="button" id="btn-add" class="primary">Add job</button>
  </header>

  <main>
    <section id="profile" class="profile-section">
      <details class="profile-card" open>
        <summary class="profile-summary">
          <h2>Profile</h2>
          <span class="profile-hint">From AGENTS.md</span>
        </summary>
        <div id="profile-content" class="profile-content">
          <p class="empty">Loading profile…</p>
        </div>
      </details>
    </section>

    <div id="message" class="message hidden" role="status"></div>

    <div class="table-toolbar">
      <label class="page-size-label">
        Per page
        <select id="page-size">
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="50">50</option>
        </select>
      </label>
      <div class="pagination">
        <button type="button" id="btn-prev" class="small" disabled>Prev</button>
        <span id="page-info" class="page-info">Page 1 of 1</span>
        <button type="button" id="btn-next" class="small" disabled>Next</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Attachments</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="jobs-body">
          <tr><td colspan="5" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <dialog id="job-dialog">
    <form id="job-form" method="dialog">
      <h2 id="dialog-title">Add job</h2>
      <input type="hidden" id="job-index" value="" />

      <label>Company <input type="text" id="field-company" required /></label>
      <label>Role <input type="text" id="field-role" required /></label>
      <label>Job URL <input type="url" id="field-source" placeholder="https://…" /></label>
      <label>Status
        <select id="field-status"></select>
      </label>
      <label>CV file path <input type="text" id="field-cv" placeholder="applied_jobs/20260622-CompanyName-Role/Andrew_Pham_CV.tex" /></label>
      <label>Cover letter path <input type="text" id="field-cover" placeholder="applied_jobs/20260622-CompanyName-Role/Andrew_Pham_CoverLetter.tex" /></label>
      <label>Notes <textarea id="field-notes" rows="3"></textarea></label>

      <div class="dialog-actions">
        <button type="button" id="btn-delete" class="danger hidden">Delete</button>
        <div class="dialog-actions-right">
          <button type="button" id="btn-cancel">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog id="link-dialog">
    <form id="link-form" method="dialog">
      <h2>Add job link</h2>
      <input type="hidden" id="link-job-index" value="" />
      <p id="link-job-label" class="link-job-label"></p>
      <label>Job URL <input type="url" id="field-link-url" placeholder="https://…" required /></label>
      <div class="dialog-actions">
        <div class="dialog-actions-right">
          <button type="button" id="btn-link-cancel">Cancel</button>
          <button type="submit" class="primary">Save link</button>
        </div>
      </div>
    </form>
  </dialog>

  <script src="/app.js?v=3"></script>
</body>
</html>
